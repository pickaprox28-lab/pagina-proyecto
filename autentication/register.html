<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>

  <div class="container">

    <a href="../index.html" class="close-btn">×</a>

    <h2>Crear Cuenta</h2>

    <div id="mensajeExito" class="success-message" style="display: none;"></div>
    <div id="mensajeError" class="error-message" style="display: none;"></div>

    <form id="registerForm">

      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>

      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" placeholder="Elige un usuario" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Ingresa tu email" required>

      <label for="password">Contraseña</label>
      <div class="password-container">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Ingresa tu contraseña"
          required
        >
        <button
          type="button"
          class="show-password"
          onclick="mostrarPassword('password')"
        >
          Ver
        </button>
      </div>

      <label for="confirmPassword">Confirmar contraseña</label>
      <div class="password-container">
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="Repite tu contraseña"
          required
        >
        <button
          type="button"
          class="show-password"
          onclick="mostrarPassword('confirmPassword')"
        >
          Ver
        </button>
      </div>

      <div class="captcha-box">
        <label for="captchaRespuesta">Captcha</label>
        <div class="captcha-row">
          <span id="captchaPregunta">Cargando...</span>
          <button type="button" id="refreshCaptcha" class="refresh-captcha">Cambiar</button>
        </div>
        <input type="number" id="captchaRespuesta" placeholder="Respuesta" required>
      </div>

      <button type="submit">Registrarse</button>

    </form>

    <div class="login-link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>

  </div>

  <script src="js/register.js"></script>

</body>
</html>

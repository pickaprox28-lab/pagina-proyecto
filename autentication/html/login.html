<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="login.css">

<style>


</style>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</head>
<body>

<div class="container">

  <a href="index.html" class="close-btn">x</a>

  <h2>Iniciar Sesión</h2>

  <form onsubmit="login(event)">

    <div class="input-group">
      <input type="email" id="email" placeholder="Ingresa tu email" required>
    </div>

    <div class="input-group password-container">

      <input type="password" id="password" placeholder="Ingresa tu contraseña" required>

      <button type="button" class="show-btn" onclick="mostrarPassword()">
        Ver
      </button>

    </div>

    <div class="recaptcha-container">
      <div class="g-recaptcha"
       data-sitekey="6Ldxev8sAAAAAKLjNqd3kQQS776nvI_kLnOJAXVZ">
      </div>
    </div>

    <br>

    <button type="submit" class="login-btn">
      Entrar
    </button>

  </form>

  <div class="register-link">
    ¿No tienes cuenta?
    <a href="sign_up.html">Regístrate</a>
  </div>

</div>

<script>

function mostrarPassword(){

  const password = document.getElementById("password");

  if(password.type === "password"){

    password.type = "text";

  }else{

    password.type = "password";

  }
}

//captcha///////////////////////////////////////////////////////////////////////
function login(event){

  event.preventDefault();

  const captcha = grecaptcha.getResponse();

  if(captcha.length === 0){
    alert("Debes completar el CAPTCHA");
    return;
  }

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

  const usuarioValido = usuarios.find(
    user => user.email === email && user.password === password
  );

  if(usuarioValido){

    alert("Bienvenido " + usuarioValido.nombre);

    window.location.href = "index.html";

  } else {

    alert("Correo o contraseña incorrectos");

    grecaptcha.reset();
  }
}

</script>

</body>
</html>

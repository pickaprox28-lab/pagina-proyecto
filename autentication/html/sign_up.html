<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" href="sign_up.css">
  <style>

    

  </style>

  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

</head>
<body>

  <div class="container">

    <a href="index.html" class="close-btn">x</a>

    <h2>Crear Cuenta</h2>

    <form onsubmit="registrarse(event)">

      <label>Nombre</label>
      <input type="text" name="nombre" placeholder="Ingresa tu nombre" required>

      <label>Email</label>
      <input type="email" name="email" placeholder="Ingresa tu email" required>

      <label>Contraseña</label>

      <div class="password-container">

        <input 
          type="password" 
          name="password" 
          id="password"
          placeholder="Ingresa tu contraseña" 
          required
        >

        <button 
          type="button" 
          class="show-password"
          onclick="mostrarPassword()"
        >
          Ver
        </button>

      </div>

      <div class="recaptcha-container">
        <div class="g-recaptcha"
       data-sitekey="6Ldxev8sAAAAAKLjNqd3kQQS776nvI_kLnOJAXVZ">
        </div>
      </div>

      <button type="submit">Registrarse</button>

    </form>

    <div class="login-link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>

  </div>

  <script>

function mostrarPassword(){

  const password = document.getElementById("password");

  if(password.type === "password"){

    password.type = "text";

  }else{

    password.type = "password";

  }
}

function registrarse(event){

  event.preventDefault();

  const captcha = grecaptcha.getResponse();

  if(captcha.length === 0){
    alert("Debes completar el CAPTCHA");
    return;
  }

  const nombre = document.querySelector('input[name="nombre"]').value;
  const email = document.querySelector('input[name="email"]').value;
  const password = document.querySelector('input[name="password"]').value;

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

  const existe = usuarios.find(user => user.email === email);

  if(existe){
    alert("Este correo ya está registrado");
    grecaptcha.reset();
    return;
  }

  const nuevoUsuario = {
    nombre,
    email,
    password
  };

  usuarios.push(nuevoUsuario);

  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  alert("Registro exitoso");

  window.location.href = "login.html";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <!-- CSS principal -->
    <link rel="stylesheet" href="login.css">

    <!-- CAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<div class="container">

    <div class="login-box">

        <a href="index.html" class="close-btn">×</a>

        <h1>Iniciar Sesión</h1>

        <div id="mensajeError" class="error-message" style="display: none;"></div>

        <form id="loginForm" onsubmit="login(event)">

            <div class="input-group">
                <label for="email">Correo Electrónico:</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="correo@ejemplo.com"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Contraseña:</label>

                <div class="password-container">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ingresa tu contraseña"
                        required
                    >

                    <button
                        type="button"
                        class="show-btn"
                        onclick="mostrarPassword()"
                    >
                        Ver
                    </button>
                </div>
            </div>

            <div class="recaptcha-container">
                <div
                    class="g-recaptcha"
                    data-sitekey="6Ldxev8sAAAAAKLjNqd3kQQS776nvI_kLnOJAXVZ">
                </div>
            </div>

            <br>

            <button type="submit">
                Iniciar Sesión
            </button>

        </form>

        <p class="register-link">
            ¿No tienes cuenta?
            <a href="sign_up.html">Regístrate aquí</a>
        </p>

    </div>

</div>

<script>
function mostrarPassword() {

    const password = document.getElementById("password");

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}

function login(event) {

    event.preventDefault();

    const mensajeError = document.getElementById("mensajeError");

    const captcha = grecaptcha.getResponse();

    if (captcha.length === 0) {

        mensajeError.style.display = "block";
        mensajeError.textContent = "Debes completar el CAPTCHA.";

        return;
    }

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    const usuarioValido = usuarios.find(
        user => user.email === email && user.password === password
    );

    if (usuarioValido) {

        alert("Bienvenido " + usuarioValido.nombre);

        window.location.href = "index.html";

    } else {

        mensajeError.style.display = "block";
        mensajeError.textContent = "Correo o contraseña incorrectos.";

        grecaptcha.reset();
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<style>

*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body{
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  
}

.container{
  width: 350px;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0);
  margin-right: 400px;
  background-color: rgba(255, 255, 255, 0.729);
}

.login-btn{
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #4facfe;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

h2{

  margin-bottom: 40px;
  color: #000000;
  font-size:25px
}



</style>    
</head>
<body>
<div class="container">
  <p>bienvenido a estadistica leña</p>
  <button type="submit" class="login-btn">
      Entrar
    </button>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado Comunal</title>
    <link rel="stylesheet" href="../../../css/dashboard.css">
    <link rel="stylesheet" href="../../../css/styles.css">
</head>
<body>
    <div class="result-container">
        <div class="result-card">
            <h1>Resultado Comunal</h1>
            <p class="subtitle">Porcentaje de contaminación mensual generado por tu registro</p>

            <div id="loadingMessage" class="loading">Cargando tu resultado...</div>

            <div id="resultContent" style="display: none;">
                <div class="single-result">
                    <h2>Porcentaje de contaminación al mes</h2>
                    <p id="porcentajeUsuario" class="result-percentage">0%</p>
                </div>

                <div class="action-buttons">
                    <button class="btn-primary" onclick="window.location.href='resultado-personal.html'">
                        Mi Impacto Personal
                    </button>
                    <button class="btn-secondary" onclick="window.location.href='../../dashboard.html'">
                        Volver al Dashboard
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/resultado-comunal.js"></script>
</body>
</html>

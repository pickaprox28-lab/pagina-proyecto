<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Datos - Estufas a Leña</title>
    <link rel="stylesheet" href="../../../css/dashboard.css">
    <link rel="stylesheet" href="../../../css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <h1>Registro de Consumo de Leña</h1>
            <p class="subtitle">Completa el formulario para contribuir a las estadísticas comunales</p>
            
            <div id="mensajeError" class="error-message" style="display: none;"></div>
            <div id="mensajeExito" class="success-message" style="display: none;"></div>
            
            <form id="registroForm">
                <!-- El mapita -->
                <div class="form-section">
                    <h3>📍 Selecciona tu dirección en el mapa</h3>
                    <div id="mapa" style="height: 300px; margin-bottom: 15px;"></div>
                    <input type="hidden" id="latitud" required>
                    <input type="hidden" id="longitud" required>
                    <div class="input-group">
                        <label for="direccion">Dirección confirmada:</label>
                        <input type="text" id="direccion" required placeholder="Calle, número, comuna" readonly>
                    </div>
                </div>
                
                <!-- Sección de la Estufa -->
                <div class="form-section">
                    <h3>Uso de calefactor o chimenea</h3>
                    <div class="question">
                        <label>¿Utilizas estufa, chimenea o estufa a pallet?</label>
                        <div class="radio-group">
                            <label><input type="radio" name="usa_estufa" value="si" required> Sí</label>
                            <label><input type="radio" name="usa_estufa" value="no"> No</label>
                        </div>
                    </div>
                    
                    <div id="detalleEstufaSection" style="display: none;">
                        <div class="question">
                            <label>¿Qué tipo de chimenea utilizas?</label>
                            <div class="radio-group vertical">
                                <label><input type="radio" name="tipo_chimenea" value="cocina_a_lena"> Cocina a leña</label>
                                <label><input type="radio" name="tipo_chimenea" value="salamandra"> Salamandra</label>
                                <label><input type="radio" name="tipo_chimenea" value="estufa_simple"> Estufa simple</label>
                                <label><input type="radio" name="tipo_chimenea" value="estufa_doble_camara"> Estufa doble cámara</label>
                                <label><input type="radio" name="tipo_chimenea" value="chimenea_abierta"> Chimenea abierta</label>
                                <label><input type="radio" name="tipo_chimenea" value="chimenea_cerrada"> Chimenea cerrada</label>
                                <label><input type="radio" name="tipo_chimenea" value="estufa_hechiza"> Estufa hechiza</label>
                                <label><input type="radio" name="tipo_chimenea" value="estufa_a_pellet"> Estufa a pellet</label>
                                <label><input type="radio" name="tipo_chimenea" value="caldera_a_pellet"> Caldera a pellet</label>
                            </div>
                        </div>

                        <div class="question">
                            <label>Tipo de uso</label>
                            <div class="radio-group vertical">
                                <label><input type="radio" name="tipo_uso" value="todos_los_dias"> Utilizo la estufa todos los días</label>
                                <label><input type="radio" name="tipo_uso" value="calefaccionar"> Utilizo para calefaccionar</label>
                                <label><input type="radio" name="tipo_uso" value="solo_cocinar"> Utilizo la estufa solo para cocinar</label>
                            </div>
                        </div>

                        <div id="tipoLenaSection" class="question">
                            <label>¿Qué leña utilizas?</label>
                            <div class="radio-group vertical">
                                <label><input type="radio" name="tipo_lena" value="lena_seca"> Leña seca</label>
                                <label><input type="radio" name="tipo_lena" value="lena_humeda"> Leña húmeda</label>
                            </div>
                        </div>
                        
                        <div class="question">
                            <label>Comentario adicional (opcional):</label>
                            <textarea id="comentario" rows="3" placeholder="Ej: Solo cocino con leña, uso para calefacción, etc."></textarea>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Enviar Datos</button>
                <button type="button" class="btn-secondary" onclick="window.location.href='../../dashboard.html'">Cancelar</button>
            </form>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../js/registro.js"></script>
</body>
</html>
